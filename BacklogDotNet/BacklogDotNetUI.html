<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Backloggd Inspired</title>
    <!-- Google Fonts for that clean, modern data-app look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for easy theme management */
        :root {
            --bg-body: #121417;        /* Main dark background */
            --bg-card: #1a1d21;        /* Slightly lighter card background */
            --bg-input: #0f1113;       /* Deep inset for inputs */
            --border: #2d323a;         /* Subtle borders */
            --text-primary: #ffffff;   /* Bright white headings */
            --text-secondary: #cbd4dc; /* Main readable text */
            --text-muted: #8f9ca7;     /* Dimmed hints and labels */
            --accent: #3b82f6;         /* Signature Backloggd blue */
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --discord: #5865F2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-secondary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container & Card */
        .login-view {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Header / Logo Section */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }

        .logo span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .forgot-link {
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            margin-top: 10px;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-discord {
            background-color: var(--discord);
            color: white;
            margin-top: 12px;
        }

        /* Divider */
        .divider {
            position: relative;
            text-align: center;
            margin: 28px 0;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--border);
            z-index: 1;
        }

        .divider span {
            position: relative;
            background-color: var(--bg-card);
            padding: 0 16px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 2;
            text-transform: uppercase;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            color: var(--accent);
        }

        /* Responsive Tweaks */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-view">
    <div class="login-card">

        <header class="login-header">
            <a href="#" class="logo">Backlog<span>gd</span></a>
            <p class="subtitle">Keep track of every game you play.</p>
        </header>

        <form>
            <div class="form-group">
                <label for="email">Email or Username</label>
                <input type="text" id="email" placeholder="e.g. MasterChief117" required>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label for="password">Password</label>
                    <a href="#" class="forgot-link">Forgot?</a>
                </div>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="button" class="btn btn-primary" onclick="login()">Sign In</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="btn btn-discord">
            <svg style="width:20px; height:20px; margin-right:10px;" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.23 10.23 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            Sign in with Discord
        </button>

        <footer class="login-footer">
            Don't have an account? <a href="#">Create one</a>
        </footer>

    </div>
</div>
<script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    let accessToken;
    function login(){
        console.log(emailInput.value);
        console.log(passwordInput.value);
        
        const sendHttpRequest = (method, url, data) => {
        const promise = new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open(method, url);

            xhr.responseType = 'json';

            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onload = function () {
                resolve(xhr.response);
            };
            
            if (data) {
                xhr.send(JSON.stringify(data));
            }
            else {
                xhr.send();
            }
        });
        return promise;
    };

   /* const getData = () => {
        sendHttpRequest ('GET', 'http://localhost:8080/auth/login').then(response => {
            console.log(response);
        });
    };*/

        const loginResponse = sendHttpRequest('POST', 'http://localhost:8080/auth/login', {Email: emailInput.value, Password: passwordInput.value});
        loginResponse.then((result) => {
            accessToken = result.accessToken;
        })
    }
    
</script>
</body>
</html>
